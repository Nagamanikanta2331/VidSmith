name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Required for PyPI trusted publishing (OIDC).
  id-token: write

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Validate metadata
        run: twine check dist/*
      - name: Verify tag matches package version
        run: |
          PKG_VERSION=$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $TAG_VERSION does not match pyproject version $PKG_VERSION" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  smoke:
    name: Install smoke test · ${{ matrix.os }}
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install wheel and smoke test
        shell: bash
        run: |
          pip install dist/*.whl
          vidsmith --version
          vidsmith doctor --no-network

  publish-pypi:
    name: Publish to PyPI
    needs: [build, smoke]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      # Uses PyPI trusted publishing — configure the publisher on pypi.org
      # (project settings → publishing) before the first release.
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: [build, smoke]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
