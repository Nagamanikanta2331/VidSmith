name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Format · Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Black (format)
        run: black --check .
      - name: MyPy (types)
        run: mypy src/vidsmith

  test:
    name: Tests · ${{ matrix.os }} · py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest
      - name: Smoke test CLI entry points
        shell: bash
        run: |
          vidsmith --version
          vidsmith doctor --no-network

  build:
    name: Build · Validate package
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tooling
        run: pip install build twine
      - name: Build sdist and wheel
        run: python -m build
      - name: Validate metadata (twine check)
        run: twine check dist/*
      - name: Install wheel in a clean environment
        run: |
          python -m venv /tmp/clean
          /tmp/clean/bin/pip install dist/*.whl
          /tmp/clean/bin/vidsmith --version
          /tmp/clean/bin/vidsmith doctor --no-network
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
