name: Bug Report
description: Report a reproducible problem with MediaForge
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please run
        `mediaforge doctor` first — most issues are environment-related.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I ran `mediaforge doctor` and reviewed the output.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: input
    id: version
    attributes:
      label: MediaForge version
      description: Output of `mediaforge --version`
      placeholder: MediaForge 1.0.0
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: "`mediaforge doctor` output"
      render: text
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact URL type, menu choices, or command you used.
      placeholder: |
        1. Paste this URL: ...
        2. Choose Best Download
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error message if any.
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.4"
    validations:
      required: true
